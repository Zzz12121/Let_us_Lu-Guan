<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>現在開始盧冠霖</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <h1>現在開始盧冠霖</h1>
      <p>我們想要盧冠</p>
      
      <div class="upload-section">
        <div class="upload-box">
          <label>1. source</label>
          <input type="file" id="sourceUpload" accept="image/*">
        </div>
        <div class="upload-box">
          <label>2. target(optional)</label>
          <input type="file" id="targetUpload" accept="image/*">
        </div>
      </div>

      <!-- 參數設定控制面板 -->
      <div class="settings-section">
        <div class="setting-box">
          <label>解析度 / 粒子數: <span id="resValue">100</span></label>
          <input type="range" id="resInput" min="50" max="250" step="10" value="100">
        </div>
        <div class="setting-box">
          <label>動畫長度 (秒): <span id="durValue">3</span></label>
          <input type="range" id="durInput" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="setting-box">
          <label>畫布大小 (px): <span id="sizeValue">600</span></label>
          <input type="range" id="sizeInput" min="400" max="800" step="50" value="600">
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">開始盧冠 (Start)</button>
        <button id="resetBtn">重置 (Reset)</button>
      </div>

      <canvas id="canvas" width="600" height="600"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
